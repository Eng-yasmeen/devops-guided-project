name: CI Build Push

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npm test

  build-and-push:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    env:
      REGISTRY_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      IMAGE_NAME: ${{ secrets.REGISTRY_LOGIN_SERVER }}/devops-mini-app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate ACR configuration
        run: |
          set -euo pipefail

          missing=0

          for key in REGISTRY_LOGIN_SERVER REGISTRY_USERNAME REGISTRY_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required registry secret: ${key}"
              missing=1
            fi
          done

          if [ "${missing}" -eq 1 ]; then
            echo "Configure ACR secrets before running the publish path."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Create short SHA tag
        id: image-tags
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ steps.image-tags.outputs.short_sha }}

      - name: Show pushed image names
        run: |
          echo "Pushed image:"
          echo "${IMAGE_NAME}:latest"
          echo "${IMAGE_NAME}:sha-${{ steps.image-tags.outputs.short_sha }}"
