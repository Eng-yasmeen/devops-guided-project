name: PR CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-validate:
    name: test-and-validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Run app tests
        working-directory: app
        run: npm test

      - name: Validate documentation journey
        run: bash scripts/validate-doc-journey.sh

      - name: Validate static runtime contract
        run: bash scripts/validate-runtime-contract.sh static


  dependency-scan:
    name: dependency-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
        working-directory: app

      - run: npm audit --omit=dev --audit-level=high
        working-directory: app


  workflow-and-compose-check:
    name: workflow-and-compose-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          set -euo pipefail
          find scripts deploy -type f -name "*.sh" -print0 | xargs -0 -n1 bash -n

      - name: Validate YAML
        run: |
          ruby -e '
            require "yaml"
            ARGV.each { |f| YAML.load_file(f) }
          ' \
            docker-compose.yml \
            docker-compose.vm.yml \
            .github/workflows/ci.yml \
            .github/workflows/publish-image.yml \
            .github/workflows/deploy-production.yml

      - name: Build image (CI only)
        run: docker build -f docker/app.Dockerfile -t devops-mini-app:ci .