name: PR CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npm test

      - name: Validate docs flow
        run: bash scripts/validate-doc-journey.sh

      - name: Validate runtime contract
        run: bash scripts/validate-runtime-contract.sh static

  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Security scan
        working-directory: app
        run: npm audit --omit=dev --audit-level=high

  workflow-and-compose-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate shell scripts
        run: find scripts deploy -type f -name "*.sh" -print0 | xargs -0 bash -n

      - name: Validate YAML
        run: |
          ruby -e 'require "yaml"; ARGV.each { |f| YAML.load_file(f) }' \
            docker-compose.yml \
            docker-compose.vm.yml \
            .github/workflows/ci.yml \
            .github/workflows/publish-image.yml \
            .github/workflows/deploy-production.yml \
            monitoring/prometheus/prometheus.yml \
            monitoring/promtail/promtail-config.yml \
            monitoring/loki/loki-config.yml \
            monitoring/grafana/provisioning/datasources/datasources.yml \
            monitoring/grafana/provisioning/dashboards/dashboards.yml

      - name: Validate docker compose
        run: |
          cp deploy/example.env .env
          cp deploy/example.secrets.env .env.secrets
          docker compose -f docker-compose.vm.yml config >/dev/null