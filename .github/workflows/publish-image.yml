name: Publish Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-push-and-scan:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-mini-app

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Show images
        run: |
          echo "Pushed:"
          echo "${IMAGE_NAME}:latest"
          echo "${IMAGE_NAME}:sha-${{ steps.vars.outputs.sha }}"