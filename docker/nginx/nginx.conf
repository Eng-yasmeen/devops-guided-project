worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format training_json escape=json
    '{"timestamp":"$time_iso8601","remote_addr":"$remote_addr","request":"$request","status":$status,"body_bytes_sent":$body_bytes_sent,"request_time":$request_time,"upstream_addr":"$upstream_addr","upstream_response_time":"$upstream_response_time","http_user_agent":"$http_user_agent"}';

  access_log /var/log/nginx/access.log training_json;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  keepalive_timeout 65;

  upstream app_upstream {
    server app:3000;
  }

  server {
    listen 80;
    server_name _;

    location = /metrics {
      return 403;
    }

    location / {
      proxy_pass http://app_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
